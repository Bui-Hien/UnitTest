spring:
  application:
    name: unittest
  datasource:
    url: jdbc:mysql://localhost:3306/unittest?createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc.batch_size: 300
        order_inserts: true
        order_updates: true
        format_sql: false